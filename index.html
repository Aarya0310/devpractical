<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple web application">
    <title>My App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
        }

        main {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 1rem;
        }

        .counter-display {
            font-size: 3rem;
            text-align: center;
            font-weight: bold;
            color: #667eea;
            margin: 1rem 0;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin: 0.25rem;
        }

        button:hover {
            background: #5568d3;
        }

        button.danger {
            background: #e74c3c;
        }

        button.danger:hover {
            background: #c0392b;
        }

        .btn-group {
            text-align: center;
            margin-top: 1rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .message {
            padding: 0.5rem;
            background: #d4edda;
            color: #155724;
            border-radius: 4px;
            margin-top: 0.5rem;
            display: none;
        }

        .message.show {
            display: block;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My App</h1>
    </header>

    <main>
        <!-- Counter Section -->
        <div class="card">
            <h2>Counter</h2>
            <div class="counter-display" id="counter">0</div>
            <div class="btn-group">
                <button id="incrementBtn">Increment</button>
                <button id="decrementBtn">Decrement</button>
                <button id="resetBtn" class="danger">Reset</button>
            </div>
        </div>

        <!-- Form Section -->
        <div class="card">
            <h2>Contact Form</h2>
            <form id="contactForm">
                <input type="text" id="nameInput" placeholder="Enter your name">
                <button type="submit">Submit</button>
            </form>
            <div class="message" id="formMessage">Thank you! Form submitted.</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 My App</p>
    </footer>

    <script>
        // Counter functionality
        let count = 0;
        const counterEl = document.getElementById('counter');
        const incrementBtn = document.getElementById('incrementBtn');
        const decrementBtn = document.getElementById('decrementBtn');
        const resetBtn = document.getElementById('resetBtn');

        incrementBtn.addEventListener('click', () => {
            count++;
            counterEl.textContent = count;
        });

        decrementBtn.addEventListener('click', () => {
            count--;
            counterEl.textContent = count;
        });

        resetBtn.addEventListener('click', () => {
            count = 0;
            counterEl.textContent = count;
        });

        // Form functionality
        const form = document.getElementById('contactForm');
        const nameInput = document.getElementById('nameInput');
        const formMessage = document.getElementById('formMessage');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (nameInput.value.trim()) {
                formMessage.classList.add('show');
                setTimeout(() => formMessage.classList.remove('show'), 3000);
                nameInput.value = '';
            }
        });
    </script>
</body>
</html>
